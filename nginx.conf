worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log off;

    upstream api_backends {
        server api1:8000;
        server api2:8000;
        keepalive 32;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api_backends;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}
