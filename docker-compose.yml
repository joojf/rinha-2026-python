services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  api1:
    image: ghcr.io/joojf/rinha-2026-python-api:latest
    platform: linux/amd64
    environment:
      - SEARCHER_URL=http://searcher:8001
    depends_on:
      - searcher
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "55MB"

  api2:
    image: ghcr.io/joojf/rinha-2026-python-api:latest
    platform: linux/amd64
    environment:
      - SEARCHER_URL=http://searcher:8001
    depends_on:
      - searcher
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "55MB"

  searcher:
    image: ghcr.io/joojf/rinha-2026-python-searcher:latest
    platform: linux/amd64
    volumes:
      - searcher-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "220MB"

volumes:
  searcher-data:

networks:
  default:
    driver: bridge
