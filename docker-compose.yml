services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  api1:
    build:
      context: ./api
      platforms:
        - linux/amd64
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165MB"

  api2:
    build:
      context: ./api
      platforms:
        - linux/amd64
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "165MB"

networks:
  default:
    driver: bridge
