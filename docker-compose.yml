services:
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  api1:
    build:
      context: ./api
      platforms:
        - linux/amd64
    environment:
      - SEARCHER_URL=http://searcher:8001
    depends_on:
      - searcher
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "55MB"

  api2:
    build:
      context: ./api
      platforms:
        - linux/amd64
    environment:
      - SEARCHER_URL=http://searcher:8001
    depends_on:
      - searcher
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "55MB"

  searcher:
    build:
      context: ./searcher
      platforms:
        - linux/amd64
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "220MB"

networks:
  default:
    driver: bridge
